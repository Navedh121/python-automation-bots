<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICARUS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #020812;
    --primary: #00d4ff;
    --secondary: #0066ff;
    --accent: #ff4d00;
    --glow: rgba(0, 212, 255, 0.4);
    --text: #c8e8ff;
    --dim: #2a4a5e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Radial glow center */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,100,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── HEADER ── */
  .header {
    position: absolute;
    top: 32px;
    text-align: center;
    letter-spacing: 0.3em;
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--primary);
    text-shadow: 0 0 20px var(--glow), 0 0 60px rgba(0,212,255,0.2);
    animation: flicker 6s infinite;
  }

  .header p {
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.5em;
    margin-top: 4px;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
  }

  /* ── MAIN ORB ── */
  .orb-container {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 48px;
  }

  .orb {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #0088cc, #001a33);
    box-shadow:
      0 0 30px rgba(0,212,255,0.3),
      0 0 60px rgba(0,100,255,0.2),
      inset 0 0 30px rgba(0,0,0,0.5);
    position: relative;
    z-index: 2;
    transition: box-shadow 0.3s ease;
  }

  /* Rotating rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.2);
    animation: rotate linear infinite;
  }

  .ring-1 {
    width: 180px; height: 180px;
    border-top-color: var(--primary);
    animation-duration: 4s;
  }
  .ring-2 {
    width: 205px; height: 205px;
    border-right-color: var(--secondary);
    animation-duration: 7s;
    animation-direction: reverse;
  }
  .ring-3 {
    width: 220px; height: 220px;
    border-bottom-color: rgba(0,212,255,0.15);
    animation-duration: 12s;
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ── WAVE BARS — voice animation ── */
  .wave {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 30px;
    z-index: 3;
  }

  .bar {
    width: 3px;
    background: var(--primary);
    border-radius: 2px;
    height: 4px;
    transition: height 0.1s ease;
    box-shadow: 0 0 6px var(--primary);
  }

  .wave.active .bar {
    animation: wave-anim 0.6s ease-in-out infinite alternate;
  }

  .bar:nth-child(1)  { animation-delay: 0.0s; }
  .bar:nth-child(2)  { animation-delay: 0.05s; }
  .bar:nth-child(3)  { animation-delay: 0.1s; }
  .bar:nth-child(4)  { animation-delay: 0.15s; }
  .bar:nth-child(5)  { animation-delay: 0.2s; }
  .bar:nth-child(6)  { animation-delay: 0.15s; }
  .bar:nth-child(7)  { animation-delay: 0.1s; }
  .bar:nth-child(8)  { animation-delay: 0.05s; }
  .bar:nth-child(9)  { animation-delay: 0.0s; }

  @keyframes wave-anim {
    from { height: 4px; }
    to   { height: 24px; }
  }

  /* Orb glow when active */
  .orb.speaking {
    box-shadow:
      0 0 50px rgba(0,212,255,0.7),
      0 0 100px rgba(0,100,255,0.4),
      inset 0 0 30px rgba(0,0,0,0.5);
  }

  .orb.listening {
    box-shadow:
      0 0 50px rgba(255,77,0,0.6),
      0 0 100px rgba(255,77,0,0.3),
      inset 0 0 30px rgba(0,0,0,0.5);
  }

  /* ── STATUS ── */
  .status {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    margin-bottom: 40px;
    min-height: 20px;
    transition: color 0.3s;
    text-transform: uppercase;
  }

  .status.active { color: var(--primary); }
  .status.listening { color: var(--accent); }

  /* ── BUTTONS ── */
  .controls {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 14px 32px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    transition: all 0.2s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-start {
    background: var(--primary);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  .btn-start:hover {
    box-shadow: 0 0 30px rgba(0,212,255,0.7);
    transform: translateY(-1px);
  }

  .btn-stop {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    box-shadow: 0 0 10px rgba(255,77,0,0.2);
  }

  .btn-stop:hover {
    background: rgba(255,77,0,0.1);
    box-shadow: 0 0 20px rgba(255,77,0,0.4);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  /* ── CHAT LOG ── */
  .chat-log {
    width: 560px;
    max-height: 180px;
    overflow-y: auto;
    border-top: 1px solid rgba(0,212,255,0.1);
    padding-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-log::-webkit-scrollbar { width: 3px; }
  .chat-log::-webkit-scrollbar-track { background: transparent; }
  .chat-log::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .msg {
    font-size: 0.78rem;
    line-height: 1.5;
    animation: fadein 0.4s ease;
  }

  .msg.user { color: var(--text); }
  .msg.user::before { content: '▸ YOU  '; color: var(--accent); font-weight: bold; }

  .msg.icarus { color: var(--primary); }
  .msg.icarus::before { content: '▸ ICARUS  '; color: var(--primary); font-weight: bold; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CORNER DECORATIONS ── */
  .corner {
    position: fixed;
    width: 60px;
    height: 60px;
    border-color: rgba(0,212,255,0.2);
    border-style: solid;
  }
  .corner-tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="header">
  <h1>ICARUS</h1>
  <p>ADVANCED AI INTERFACE — v1.0</p>
</div>

<div class="orb-container">
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="orb" id="orb">
    <div class="wave" id="wave">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>
</div>

<div class="status" id="status">INITIALIZING...</div>

<div class="controls">
  <button class="btn btn-start" id="startBtn" onclick="startRecording()" disabled>▶ SPEAK</button>
  <button class="btn btn-stop"  id="stopBtn"  onclick="stopRecording()"  disabled>■ STOP</button>
</div>

<div class="chat-log" id="chatLog"></div>

<script>
  const orb       = document.getElementById("orb");
  const wave      = document.getElementById("wave");
  const status    = document.getElementById("status");
  const startBtn  = document.getElementById("startBtn");
  const stopBtn   = document.getElementById("stopBtn");
  const chatLog   = document.getElementById("chatLog");

  // ── greet on load ──
  window.addEventListener("load", async () => {
    setStatus("ICARUS ONLINE", "active");
    setOrb("speaking");
    const res = await fetch("/greet", { method: "POST" });
    const data = await res.json();
    addMessage("icarus", data.icarus);
    await sleep(2200);
    setOrb("idle");
    setStatus("READY", "active");
    startBtn.disabled = false;
  });

  // ── start recording ──
  async function startRecording() {
    startBtn.disabled = true;
    stopBtn.disabled = false;
    setOrb("listening");
    setStatus("LISTENING...", "listening");
    wave.classList.add("active");
    await fetch("/start", { method: "POST" });
  }

  // ── stop recording ──
  async function stopRecording() {
    stopBtn.disabled = true;
    wave.classList.remove("active");
    setStatus("PROCESSING...", "active");
    setOrb("idle");

    const res = await fetch("/stop", { method: "POST" });

    if (!res.ok) {
      setStatus("COULD NOT UNDERSTAND. TRY AGAIN.", "");
      setOrb("idle");
      startBtn.disabled = false;
      return;
    }

    const data = await res.json();
    addMessage("user", data.user);

    setOrb("speaking");
    setStatus("ICARUS SPEAKING...", "active");
    wave.classList.add("active");
    addMessage("icarus", data.icarus);

    // estimate speech duration and reset after
    const duration = data.icarus.length * 55;
    await sleep(duration);

    wave.classList.remove("active");
    setOrb("idle");

    if (data.exit) {
      setStatus("ICARUS OFFLINE", "");
      return;
    }

    setStatus("READY", "active");
    startBtn.disabled = false;
  }

  // ── helpers ──
  function setOrb(state) {
    orb.className = "orb";
    if (state !== "idle") orb.classList.add(state);
  }

  function setStatus(text, cls) {
    status.textContent = text;
    status.className = "status " + cls;
  }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }
</script>
</body>
</html>
